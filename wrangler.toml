# Cloudflare Workers — Static Assets (assets-only, no server-side code).
# `name` MUST match the connected Worker's dashboard name exactly, or the
# Workers Build fails. No `main` / no `binding` => no Worker script runs;
# Cloudflare serves ./dist straight from the edge.
name = "sandbox"
compatibility_date = "2026-07-07"

# Required for PR preview URLs (<branch>-sandbox.<account>.workers.dev).
# Must stay above [assets] — a bare key after a table header parses into
# that table in TOML, not the root document.
preview_urls = true

[assets]
directory = "./dist"
# Astro builds src/pages/404.astro -> dist/404.html for unmatched paths.
not_found_handling = "404-page"
